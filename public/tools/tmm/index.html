<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TMM — Time Management Matrix</title>
    <style>
      /* ── Custom properties ───────────────────────────────────────────────── */
      :root {
        /* Quadrant colours */
        --color-q1:           #FECACA; /* Q1 Firefighting — High Impact, High Urgency (top-left)    */
        --color-q2:           #BBF7D0; /* Q2 Growth       — High Impact, Low Urgency  (top-right)   */
        --color-q3:           #FEF08A; /* Q3 Distraction  — Low Impact,  High Urgency (bottom-left) */
        --color-q4:           #E2E8F0; /* Q4 Waste        — Low Impact,  Low Urgency  (bottom-right) */

        /* Surface / neutral palette */
        --color-bg:           #f8f9fa;
        --color-surface:      #ffffff;
        --color-border:       #e2e8f0;
        --color-label:        #1a1a2e;
        --color-muted:        #6b7280;
        --color-primary:      #4f46e5;
        --color-primary-hover:#4338ca;
        --color-danger:       #dc2626;

        /* Spacing scale */
        --space-xs:  4px;
        --space-sm:  8px;
        --space-md:  16px;
        --space-lg:  24px;

        /* Typography */
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                     Helvetica, Arial, sans-serif;
        --font-size-base: 15px;
        --font-size-sm:   13px;
        --font-size-xs:   11px;

        /* Shape */
        --radius:    6px;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, .08);
      }

      /* ── Reset & base ────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--font-sans);
        font-size: var(--font-size-base);
        line-height: 1.6;
        background: var(--color-bg);
        color: var(--color-label);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Toolbar ─────────────────────────────────────────────────────────── */
      #toolbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px var(--space-lg);
        gap: var(--space-md);
        background: var(--color-surface);
        border-bottom: 1px solid var(--color-border);
        box-shadow: var(--shadow-sm);
        z-index: 100;
      }

      .toolbar-brand h1 {
        font-size: 18px;
        font-weight: 700;
        color: var(--color-label);
        letter-spacing: -0.02em;
        white-space: nowrap;
      }

      .toolbar-actions {
        display: flex;
        gap: var(--space-sm);
        align-items: center;
      }

      .toolbar-link {
        font-size: var(--font-size-xs);
        color: var(--color-primary);
        text-decoration: none;
        white-space: nowrap;
        margin-right: var(--space-xs);
      }
      .toolbar-link:hover { text-decoration: underline; }

      #toolbar button {
        padding: 7px 13px;
        font-size: var(--font-size-sm);
        font-weight: 500;
        border-radius: var(--radius);
        cursor: pointer;
        border: 1px solid var(--color-border);
        background: transparent;
        color: var(--color-label);
        font-family: var(--font-sans);
        transition: background 0.15s, border-color 0.15s;
        white-space: nowrap;
      }
      #toolbar button:hover { background: #f0f0f0; border-color: #bbb; }
      #toolbar button:active { background: #e8e8e8; }

      /* ── Canvas wrapper ──────────────────────────────────────────────────── */
      #canvas-wrapper {
        flex: 1;
        display: flex;
        overflow: hidden;
        padding: var(--space-lg);
        gap: var(--space-sm);
        min-height: 0;
      }

      /* Rotated Y-axis labels container (Impact) */
      .axis-y-labels {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        width: 18px;
        user-select: none;
      }

      .axis-y-label {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        font-size: var(--font-size-xs);
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--color-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
      }

      /* Column that holds canvas + x-axis label */
      .canvas-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        gap: var(--space-xs);
        min-width: 0;
      }

      /* X-axis labels container (Urgency) */
      .axis-x-labels {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        user-select: none;
      }

      .axis-x-label {
        font-size: var(--font-size-xs);
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--color-muted);
      }

      /* ── Four-quadrant canvas ────────────────────────────────────────────── */
      #canvas {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        border: 2px solid var(--color-border);
        border-radius: var(--radius);
        position: relative;  /* positioning context for absolutely-placed dots */
        overflow: hidden;
        min-height: 0;
      }

      .quadrant {
        padding: var(--space-sm);
        border: 1px solid rgba(0, 0, 0, .06);
      }

      /* Quadrant grid placement */
      .quadrant-q1 { background: var(--color-q1); grid-row: 1; grid-column: 1; } /* top-left  — Firefighting */
      .quadrant-q2 { background: var(--color-q2); grid-row: 1; grid-column: 2; } /* top-right — Growth */
      .quadrant-q3 { background: var(--color-q3); grid-row: 2; grid-column: 1; } /* bot-left  — Distraction */
      .quadrant-q4 { background: var(--color-q4); grid-row: 2; grid-column: 2; } /* bot-right — Waste */

      .quadrant-heading {
        font-size: var(--font-size-xs);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--color-muted);
        opacity: 0.8;
        user-select: none;
        pointer-events: none;
      }

      /* ── Initiative dot ──────────────────────────────────────────────────── */
      .dot {
        position: absolute;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--color-primary);
        border: 2px solid #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, .25);
        cursor: grab;
        touch-action: none;        /* T016: prevents scroll hijack on touch */
        will-change: transform;   /* T016: GPU compositing */
        /* Center the dot on its coordinate point */
        transform: translate(-50%, -50%);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: box-shadow 0.15s;
        z-index: 10;
      }
      .dot:hover  { box-shadow: 0 4px 16px rgba(0, 0, 0, .35); }
      .dot.dragging { cursor: grabbing; z-index: 20; } /* T016 */
      .dot:focus-visible {
        outline: 3px solid var(--color-primary);
        outline-offset: 2px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, .35);
      }

      /* Dot label (below the dot circle) */
      .dot-label {
        position: absolute;
        top: calc(100% + 4px);
        left: 50%;
        transform: translateX(-50%);
        font-size: 10px;
        font-weight: 600;
        color: var(--color-label);
        background: rgba(255, 255, 255, .92);
        border: 1px solid var(--color-border);
        border-radius: 3px;
        padding: 1px 5px;
        white-space: nowrap;
        max-width: 140px;
        overflow: hidden;
        text-overflow: ellipsis;
        pointer-events: none;
        user-select: none;
      }

      /* ── Detail panel ────────────────────────────────────────────────────── */
      #detail-panel {
        display: none; /* shown via .visible class */
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 300px;
        background: var(--color-surface);
        border-left: 1px solid var(--color-border);
        box-shadow: -4px 0 16px rgba(0, 0, 0, .08);
        z-index: 50;
        padding: var(--space-lg);
        flex-direction: column;
        gap: var(--space-md);
        overflow-y: auto;
      }
      #detail-panel.visible { display: flex; }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-sm);
      }

      .panel-title {
        font-size: var(--font-size-xs);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--color-muted);
      }

      .panel-close {
        padding: 4px 7px;
        font-size: 15px;
        line-height: 1;
        background: transparent;
        border: 1px solid transparent;
        border-radius: var(--radius);
        cursor: pointer;
        color: var(--color-muted);
        font-family: var(--font-sans);
        transition: background 0.15s, color 0.15s;
      }
      .panel-close:hover {
        background: #f0f0f0;
        color: var(--color-label);
        border-color: var(--color-border);
      }

      .panel-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .panel-field-label {
        font-size: var(--font-size-xs);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--color-muted);
      }

      .panel-field-value {
        font-size: 14px;
        color: var(--color-label);
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }

      /* ── Add Initiative modal ────────────────────────────────────────────── */
      #modal-overlay {
        display: none; /* shown via .visible class */
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .45);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }
      #modal-overlay.visible { display: flex; }

      #modal-box {
        background: var(--color-surface);
        border-radius: var(--radius);
        box-shadow: 0 8px 32px rgba(0, 0, 0, .2);
        padding: var(--space-lg);
        width: 100%;
        max-width: 440px;
        display: flex;
        flex-direction: column;
        gap: var(--space-md);
      }

      .modal-heading {
        font-size: 16px;
        font-weight: 700;
        color: var(--color-label);
      }

      .form-field {
        display: flex;
        flex-direction: column;
        gap: var(--space-xs);
      }

      .form-field label {
        font-size: var(--font-size-xs);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--color-muted);
      }

      .form-field input[type="text"],
      .form-field textarea {
        padding: 8px 12px;
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.5;
        color: var(--color-label);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        background: #fafafa;
        transition: border-color 0.15s, box-shadow 0.15s;
        resize: vertical;
      }
      .form-field input[type="text"]:focus,
      .form-field textarea:focus {
        outline: none;
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, .15);
        background: var(--color-surface);
      }
      .form-field input[type="text"].input-error {
        border-color: var(--color-danger);
        box-shadow: 0 0 0 3px rgba(220, 38, 38, .12);
      }

      .form-error {
        display: none;
        font-size: var(--font-size-xs);
        color: var(--color-danger);
        font-weight: 500;
      }
      .form-error.visible { display: block; }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: var(--space-sm);
        padding-top: var(--space-xs);
      }

      .btn-primary {
        padding: 8px 16px;
        font-size: var(--font-size-sm);
        font-weight: 600;
        background: var(--color-primary);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        font-family: var(--font-sans);
        transition: background 0.15s;
      }
      .btn-primary:hover { background: var(--color-primary-hover); }

      .btn-secondary {
        padding: 8px 16px;
        font-size: var(--font-size-sm);
        font-weight: 500;
        background: transparent;
        color: var(--color-muted);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        cursor: pointer;
        font-family: var(--font-sans);
        transition: background 0.15s;
      }
      .btn-secondary:hover { background: #f0f0f0; }

      /* ── Detail panel view / edit mode containers (T021) ────────────────── */
      #panel-view-mode,
      #panel-edit-mode {
        display: flex;
        flex-direction: column;
        gap: var(--space-md);
        flex: 1;
      }

      .panel-actions {
        display: flex;
        gap: var(--space-sm);
        justify-content: flex-end;
        margin-top: auto;
        padding-top: var(--space-xs);
      }
    </style>
  </head>
  <body>

    <!-- ── Toolbar ──────────────────────────────────────────────────────────── -->
    <header id="toolbar">
      <div class="toolbar-brand">
        <h1>TMM — Time Management Matrix</h1>
      </div>
      <div class="toolbar-actions">
        <a href="../../index.html" class="toolbar-link">← Back to Toolkit</a>
        <button id="btn-add" type="button">+ Add Initiative</button>
        <button id="btn-save" type="button">💾 Save</button>
        <button id="btn-load" type="button">📂 Load</button>
        <!-- Hidden file input for load action (T014) -->
        <input
          type="file"
          id="file-input"
          accept=".json"
          style="display:none"
          aria-hidden="true"
          tabindex="-1"
        />
      </div>
    </header>

    <!-- ── Canvas wrapper ────────────────────────────────────────────────────── -->
    <div id="canvas-wrapper">
      <!-- Y-axis labels (Impact) — upper half: More Impact, lower half: Less Impact -->
      <div class="axis-y-labels" aria-hidden="true">
        <span class="axis-y-label">More Impact</span>
        <span class="axis-y-label">Less Impact</span>
      </div>

      <div class="canvas-area">
        <!-- Four-quadrant canvas; dots appended here by renderCanvas() -->
        <div
          id="canvas"
          role="region"
          aria-label="Time Management Matrix canvas"
        >
          <!-- Q1: top-left — High Impact, High Urgency (Firefighting) -->
          <div
            class="quadrant quadrant-q1"
            aria-label="Q1: Firefighting — High Impact, High Urgency"
          >
            <span class="quadrant-heading">Q1 Firefighting</span>
          </div>

          <!-- Q2: top-right — High Impact, Low Urgency (Growth) -->
          <div
            class="quadrant quadrant-q2"
            aria-label="Q2: Growth — High Impact, Low Urgency"
          >
            <span class="quadrant-heading">Q2 Growth</span>
          </div>

          <!-- Q3: bottom-left — Low Impact, High Urgency (Distraction) -->
          <div
            class="quadrant quadrant-q3"
            aria-label="Q3: Distraction — Low Impact, High Urgency"
          >
            <span class="quadrant-heading">Q3 Distraction</span>
          </div>

          <!-- Q4: bottom-right — Low Impact, Low Urgency (Waste) -->
          <div
            class="quadrant quadrant-q4"
            aria-label="Q4: Waste — Low Impact, Low Urgency"
          >
            <span class="quadrant-heading">Q4 Waste</span>
          </div>

          <!-- Initiative dots are inserted here by renderCanvas() -->
        </div>

        <!-- X-axis labels (Urgency) — left: More Urgent, right: Less Urgent -->
        <div class="axis-x-labels" aria-hidden="true">
          <span class="axis-x-label">More Urgent</span>
          <span class="axis-x-label">Less Urgent</span>
        </div>
      </div>
    </div>

    <!-- ── Detail panel ─────────────────────────────────────────────────────── -->
    <aside
      id="detail-panel"
      aria-label="Initiative details"
      role="complementary"
    >
      <div class="panel-header">
        <span class="panel-title">Details</span>
        <button
          class="panel-close"
          id="btn-panel-close"
          type="button"
          aria-label="Close detail panel"
        >✕</button>
      </div>

      <!-- View mode (T010) -->
      <div id="panel-view-mode">
        <div class="panel-field">
          <span class="panel-field-label">Name</span>
          <span class="panel-field-value" id="panel-name"></span>
        </div>

        <div class="panel-field">
          <span class="panel-field-label">Category</span>
          <span class="panel-field-value" id="panel-category"></span>
        </div>

        <div class="panel-field">
          <span class="panel-field-label">Details</span>
          <span class="panel-field-value" id="panel-details"></span>
        </div>

        <div class="panel-actions">
          <button type="button" id="btn-edit" class="btn-primary">Edit</button>
        </div>
      </div>

      <!-- Edit mode (T021–T023) — hidden until "Edit" is clicked -->
      <div id="panel-edit-mode" style="display:none">
        <div class="form-field">
          <label for="edit-name">Name <span aria-hidden="true">*</span></label>
          <input type="text" id="edit-name" autocomplete="off" />
          <span class="form-error" id="edit-error-name" role="alert">Name is required.</span>
        </div>

        <div class="form-field">
          <label for="edit-category">Category</label>
          <input type="text" id="edit-category" autocomplete="off" />
        </div>

        <div class="form-field">
          <label for="edit-details">Details</label>
          <textarea id="edit-details" rows="4"></textarea>
        </div>

        <div class="panel-actions">
          <button type="button" id="btn-edit-cancel" class="btn-secondary">Cancel</button>
          <button type="button" id="btn-edit-confirm" class="btn-primary">Confirm</button>
        </div>
      </div>
    </aside>

    <!-- ── Add Initiative modal (T007) ──────────────────────────────────────── -->
    <div
      id="modal-overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-heading"
    >
      <div id="modal-box">
        <h2 class="modal-heading" id="modal-heading">Add Initiative</h2>

        <!-- Name (required) -->
        <div class="form-field">
          <label for="field-name">
            Name <span aria-hidden="true">*</span>
          </label>
          <input
            type="text"
            id="field-name"
            placeholder="Initiative name"
            autocomplete="off"
          />
          <span class="form-error" id="error-name" role="alert">
            Name is required.
          </span>
        </div>

        <!-- Category (optional free text) -->
        <div class="form-field">
          <label for="field-category">Category</label>
          <input
            type="text"
            id="field-category"
            placeholder="e.g. Health, Career, Finance"
            autocomplete="off"
          />
        </div>

        <!-- Details (optional multi-line) -->
        <div class="form-field">
          <label for="field-details">Details</label>
          <textarea
            id="field-details"
            rows="4"
            placeholder="Optional notes or description"
          ></textarea>
        </div>

        <div class="modal-actions">
          <button
            type="button"
            class="btn-secondary"
            id="btn-modal-cancel"
          >Cancel</button>
          <button
            type="button"
            class="btn-primary"
            id="btn-modal-submit"
          >Add Initiative</button>
        </div>
      </div>
    </div>

    <script>
      'use strict';

      /* ════════════════════════════════════════════════════════════════════
         State (T003)
         ════════════════════════════════════════════════════════════════════ */
      /** @type {Array<Object>} In-memory list of all initiatives */
      var initiatives = [];

      /**
       * Full parsed project-file object from the last Load action.
       * Used to preserve non-tmm sections on Save (Constitution Principle VI).
       * @type {Object|null}
       */
      var loadedProjectFile = null;

      /** ID of the currently selected initiative (detail panel open). */
      var selectedInitiativeId = null;

      /** Whether the detail panel is in edit mode (set by US5 — Phase 6). */
      var isEditing = false;

      /** Snapshot of initiative values taken when edit mode opens (T023). */
      var editSnapshot = null;

      /* ════════════════════════════════════════════════════════════════════
         UUID v4 (T004)
         Matches: /^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i
         ════════════════════════════════════════════════════════════════════ */
      function generateUUID() {
        /* Use the native CSPRNG when available (modern browsers). */
        if (
          typeof crypto !== 'undefined' &&
          typeof crypto.randomUUID === 'function'
        ) {
          return crypto.randomUUID();
        }
        /* Fallback: manually built UUID v4 using Math.random(). */
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(
          /[xy]/g,
          function (c) {
            var r = (Math.random() * 16) | 0;
            var v = c === 'x' ? r : (r & 0x3) | 0x8;
            return v.toString(16);
          }
        );
      }

      /* ════════════════════════════════════════════════════════════════════
         renderCanvas (T003 stub → T009 full implementation)

         Iterates initiatives[] and syncs DOM: removes stale dots, creates
         one absolutely-positioned .dot per initiative at:
           left = x * 100%
           top  = (1 - y) * 100%
         (canvas origin = top-left; y=1 → top of canvas)
         ════════════════════════════════════════════════════════════════════ */
      function renderCanvas() {
        var canvas = document.getElementById('canvas');

        /* Remove all existing dots (leave quadrant divs in place). */
        var oldDots = canvas.querySelectorAll('.dot');
        for (var i = 0; i < oldDots.length; i++) {
          canvas.removeChild(oldDots[i]);
        }

        /* Build one dot per initiative. */
        initiatives.forEach(function (initiative) {
          var dot = document.createElement('div');
          dot.className = 'dot';
          dot.dataset.id = initiative.id;
          dot.setAttribute('role', 'button');
          dot.setAttribute('aria-label', 'Initiative: ' + initiative.name);
          dot.setAttribute('tabindex', '0');

          /* Position: left = x * 100%, top = (1 − y) * 100% */
          dot.style.left = (initiative.tmm.x * 100) + '%';
          dot.style.top  = ((1 - initiative.tmm.y) * 100) + '%';

          /* Visible label underneath the dot circle */
          var label = document.createElement('span');
          label.className = 'dot-label';
          label.textContent = initiative.name;
          dot.appendChild(label);

          /* ── Drag (T017–T019) + click/keyboard (T010) handlers ──── */
          (function attachHandlers(dotEl, init) {
            var isDragging = false;
            var hasMoved   = false;
            var offsetX    = 0, offsetY = 0;
            var startX     = 0, startY  = 0;

            /* pointerdown: begin drag (T017) */
            dotEl.addEventListener('pointerdown', function (e) {
              /* Only primary button for mouse; all pointer types for touch/pen */
              if (e.pointerType === 'mouse' && e.button !== 0) return;
              e.preventDefault(); /* suppress text-selection during drag */

              var cvs = document.getElementById('canvas');
              var cr  = cvs.getBoundingClientRect();
              var dr  = dotEl.getBoundingClientRect();

              /* Centre of the dot relative to canvas top-left */
              var cx = dr.left + dr.width  / 2 - cr.left;
              var cy = dr.top  + dr.height / 2 - cr.top;

              /* Offset from dot centre to pointer (≈0 when clicking centre) */
              offsetX = (e.clientX - cr.left) - cx;
              offsetY = (e.clientY - cr.top)  - cy;

              startX = e.clientX;
              startY = e.clientY;

              isDragging = true;
              hasMoved   = false;

              dotEl.setPointerCapture(e.pointerId);
              dotEl.classList.add('dragging');
            });

            /* pointermove: real-time repositioning (T018) */
            dotEl.addEventListener('pointermove', function (e) {
              if (!isDragging) return;

              var dx = e.clientX - startX;
              var dy = e.clientY - startY;
              if (Math.sqrt(dx * dx + dy * dy) > 4) hasMoved = true;

              var cvs = document.getElementById('canvas');
              var cr  = cvs.getBoundingClientRect();

              var newX = e.clientX - cr.left - offsetX;
              var newY = e.clientY - cr.top  - offsetY;

              /* Clamp dot centre to canvas boundary (T018) */
              newX = Math.max(0, Math.min(cr.width,  newX));
              newY = Math.max(0, Math.min(cr.height, newY));

              dotEl.style.left = newX + 'px';
              dotEl.style.top  = newY + 'px';
            });

            /* pointerup: commit position or treat as click (T019) */
            dotEl.addEventListener('pointerup', function (e) {
              if (!isDragging) return;

              dotEl.releasePointerCapture(e.pointerId);
              dotEl.classList.remove('dragging');
              isDragging = false;

              if (!hasMoved) {
                /* No significant movement — treat as click, open detail panel */
                openDetailPanel(init.id);
                return;
              }

              var cvs = document.getElementById('canvas');
              var cr  = cvs.getBoundingClientRect();

              var newX = e.clientX - cr.left - offsetX;
              var newY = e.clientY - cr.top  - offsetY;

              newX = Math.max(0, Math.min(cr.width,  newX));
              newY = Math.max(0, Math.min(cr.height, newY));

              /* Normalise to [0.0, 1.0] (T019) */
              var normX = Math.max(0, Math.min(1, newX / cr.width));
              var normY = Math.max(0, Math.min(1, 1 - newY / cr.height));

              /* Update the matching initiative in state */
              for (var i = 0; i < initiatives.length; i++) {
                if (initiatives[i].id === init.id) {
                  initiatives[i].tmm.x = normX;
                  initiatives[i].tmm.y = normY;
                  break;
                }
              }

              renderCanvas();
            });

            /* Keyboard: Enter / Space opens the panel */
            dotEl.addEventListener('keydown', function (e) {
              if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                openDetailPanel(init.id);
              }
            });

          }(dot, initiative));

          canvas.appendChild(dot);
        });
      }

      /* ════════════════════════════════════════════════════════════════════
         Detail panel (T010, T011)
         ════════════════════════════════════════════════════════════════════ */

      /** Open the detail panel for the initiative with the given id (T010). */
      function openDetailPanel(id) {
        var initiative = null;
        for (var i = 0; i < initiatives.length; i++) {
          if (initiatives[i].id === id) { initiative = initiatives[i]; break; }
        }
        if (!initiative) return;

        selectedInitiativeId = id;
        isEditing = false;
        editSnapshot = null;

        document.getElementById('panel-name').textContent     = initiative.name;
        document.getElementById('panel-category').textContent = initiative.tmm.category;
        document.getElementById('panel-details').textContent  = initiative.tmm.details;

        /* Ensure view mode is active, edit mode hidden */
        document.getElementById('panel-view-mode').style.display = 'flex';
        document.getElementById('panel-edit-mode').style.display = 'none';

        document.getElementById('detail-panel').classList.add('visible');
      }

      /**
       * Close the detail panel (T011).
       * Clears selectedInitiativeId, resets isEditing, hides the panel.
       * All dots remain at their last positions.
       */
      function closeDetailPanel() {
        selectedInitiativeId = null;
        isEditing = false;
        editSnapshot = null;
        document.getElementById('detail-panel').classList.remove('visible');
        /* Reset to view mode for next open */
        document.getElementById('panel-view-mode').style.display = 'flex';
        document.getElementById('panel-edit-mode').style.display = 'none';
      }

      /* ════════════════════════════════════════════════════════════════════
         Edit initiative (T021, T022, T023)
         ════════════════════════════════════════════════════════════════════ */

      /**
       * Switch the detail panel to edit mode (T021).
       * Pre-populates fields with current initiative values and saves a
       * snapshot so cancelEdit() can revert to them (T023).
       */
      function openEditMode() {
        var initiative = null;
        for (var i = 0; i < initiatives.length; i++) {
          if (initiatives[i].id === selectedInitiativeId) {
            initiative = initiatives[i];
            break;
          }
        }
        if (!initiative) return;

        /* Save snapshot for cancel revert (T023) */
        editSnapshot = {
          name:     initiative.name,
          category: initiative.tmm.category,
          details:  initiative.tmm.details
        };

        /* Populate edit fields */
        document.getElementById('edit-name').value     = initiative.name;
        document.getElementById('edit-category').value = initiative.tmm.category;
        document.getElementById('edit-details').value  = initiative.tmm.details;

        /* Clear any stale validation error */
        document.getElementById('edit-name').classList.remove('input-error');
        document.getElementById('edit-error-name').classList.remove('visible');

        isEditing = true;
        document.getElementById('panel-view-mode').style.display = 'none';
        document.getElementById('panel-edit-mode').style.display = 'flex';
        document.getElementById('edit-name').focus();
      }

      /**
       * Confirm edits: validate Name, update initiatives[], refresh canvas,
       * close panel (T022).
       */
      function confirmEdit() {
        var name = document.getElementById('edit-name').value.trim();
        if (!name) {
          document.getElementById('edit-name').classList.add('input-error');
          document.getElementById('edit-error-name').classList.add('visible');
          document.getElementById('edit-name').focus();
          return;
        }

        var category = document.getElementById('edit-category').value.trim();
        var details  = document.getElementById('edit-details').value;

        for (var i = 0; i < initiatives.length; i++) {
          if (initiatives[i].id === selectedInitiativeId) {
            initiatives[i].name         = name;
            initiatives[i].tmm.category = category;
            initiatives[i].tmm.details  = details;
            break;
          }
        }

        isEditing    = false;
        editSnapshot = null;
        closeDetailPanel();
        renderCanvas();
      }

      /**
       * Cancel edits: revert view mode to the snapshot taken at edit-open,
       * without writing any changes to initiatives[] (T023).
       */
      function cancelEdit() {
        isEditing = false;
        document.getElementById('panel-edit-mode').style.display = 'none';
        document.getElementById('panel-view-mode').style.display = 'flex';

        /* Restore snapshot values in the view-mode fields (T023) */
        if (editSnapshot) {
          document.getElementById('panel-name').textContent     = editSnapshot.name;
          document.getElementById('panel-category').textContent = editSnapshot.category;
          document.getElementById('panel-details').textContent  = editSnapshot.details;
        }
        editSnapshot = null;
      }

      /* ════════════════════════════════════════════════════════════════════
         Add Initiative modal (T007, T008)
         ════════════════════════════════════════════════════════════════════ */
      function openModal() {
        document.getElementById('field-name').value     = '';
        document.getElementById('field-category').value = '';
        document.getElementById('field-details').value  = '';
        document.getElementById('field-name').classList.remove('input-error');
        document.getElementById('error-name').classList.remove('visible');
        document.getElementById('modal-overlay').classList.add('visible');
        document.getElementById('field-name').focus();
      }

      /** Close the Add Initiative modal without saving. */
      function closeModal() {
        document.getElementById('modal-overlay').classList.remove('visible');
      }

      /**
       * Validate and submit the Add Initiative form (T008).
       * - Validates Name non-empty; shows inline error if empty.
       * - Generates UUID v4 id.
       * - Creates initiative object with tmm section at canvas centre (0.5, 0.5).
       * - Pushes to initiatives[], closes modal, calls renderCanvas().
       */
      function submitModal() {
        var name = document.getElementById('field-name').value.trim();

        if (!name) {
          document.getElementById('field-name').classList.add('input-error');
          document.getElementById('error-name').classList.add('visible');
          document.getElementById('field-name').focus();
          return;
        }

        var category = document.getElementById('field-category').value.trim();
        var details  = document.getElementById('field-details').value;

        var initiative = {
          id:        generateUUID(),
          name:      name,
          coer:      null,
          sob:       null,
          memoryMap: null,
          impactMap: null,
          tmm: {
            category: category,
            details:  details,
            x:        0.5,
            y:        0.5
          }
        };

        initiatives.push(initiative);
        closeModal();
        renderCanvas();
      }

      /* ════════════════════════════════════════════════════════════════════
         Save (T012, T013)
         ════════════════════════════════════════════════════════════════════ */

      /**
       * Build the effectivenessToolkit JSON envelope and trigger a browser
       * download (T012).
       *
       * Round-trip preservation (T013 / Constitution Principle VI):
       * - For each initiative, spread its original data from loadedProjectFile
       *   so that coer, sob, memoryMap, impactMap and any unknown top-level
       *   initiative fields are written back unchanged.
       * - For new initiatives (not in the loaded file), those sections are null.
       * - Unknown extra fields inside the tmm section are also preserved by
       *   spreading originalTmm before the known fields.
       */
      function saveToFile() {
        var savedInitiatives = initiatives.map(function (initiative) {
          /* Find original initiative record from the loaded file, if any. */
          var original = null;
          if (
            loadedProjectFile &&
            loadedProjectFile.effectivenessToolkit &&
            Array.isArray(loadedProjectFile.effectivenessToolkit.initiatives)
          ) {
            var pool = loadedProjectFile.effectivenessToolkit.initiatives;
            for (var j = 0; j < pool.length; j++) {
              if (pool[j].id === initiative.id) { original = pool[j]; break; }
            }
          }

          /*
           * Base object:
           *   • If found in loaded file → spread all original fields (preserves
           *     coer, sob, memoryMap, impactMap, and any unknown extras).
           *   • If new → initialise with null sections per contract (T008).
           */
          var saved = original
            ? Object.assign({}, original)
            : {
                id:        initiative.id,
                name:      initiative.name,
                coer:      null,
                sob:       null,
                memoryMap: null,
                impactMap: null
              };

          /* Always sync id and name from in-memory state. */
          saved.id   = initiative.id;
          saved.name = initiative.name;

          /*
           * Write tmm section: spread originalTmm first so unknown extra
           * fields are preserved (T015), then override the known fields.
           */
          var originalTmm = (original && original.tmm) ? original.tmm : {};
          saved.tmm = Object.assign({}, originalTmm, {
            category: initiative.tmm.category,
            details:  initiative.tmm.details,
            x:        initiative.tmm.x,
            y:        initiative.tmm.y
          });

          return saved;
        });

        var envelope = {
          effectivenessToolkit: {
            version:      '1.0',
            lastModified: new Date().toISOString(),
            initiatives:  savedInitiatives
          }
        };

        var json = JSON.stringify(envelope, null, 2);
        var blob = new Blob([json], { type: 'application/json' });
        var url  = URL.createObjectURL(blob);
        var a    = document.createElement('a');
        a.href     = url;
        a.download = 'effectiveness-toolkit.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      /* ════════════════════════════════════════════════════════════════════
         Load (T014, T015)
         ════════════════════════════════════════════════════════════════════ */

      /** Open a native file picker (T014). */
      function triggerLoad() {
        document.getElementById('file-input').click();
      }

      /**
       * Parse the selected JSON file and restore canvas state (T014).
       *
       * Edge cases handled (T015):
       *  • no tmm key on an initiative    → that initiative is silently skipped
       *  • missing / empty initiatives[]  → render empty canvas
       *  • unknown extra fields in tmm    → preserved in loadedProjectFile and
       *                                      written back on next save (via
       *                                      Object.assign spread in saveToFile)
       *  • invalid JSON                   → console.error, no user-facing crash
       */
      function loadFromFile(file) {
        var reader = new FileReader();
        reader.onload = function (e) {
          try {
            var parsed = JSON.parse(e.target.result);
            loadedProjectFile = parsed;

            var envelope        = parsed && parsed.effectivenessToolkit;
            var rawInitiatives  = (envelope && Array.isArray(envelope.initiatives))
              ? envelope.initiatives
              : [];

            if (rawInitiatives.length === 0) {
              initiatives = [];
              renderCanvas();
              return;
            }

            initiatives = rawInitiatives
              /* Keep ALL valid initiatives — including those with no tmm section.
                 Dropping non-tmm initiatives would silently delete COER / Memory
                 Map entries from the shared project file on next save, violating
                 Constitution Principle VI (round-trip preservation).
                 Initiatives with no tmm section are placed at canvas centre (0.5,
                 0.5) per Contract 4 rule 6; they only receive a tmm section once
                 the user interacts with them (drags or edits). */
              .filter(function (item) {
                return item && item.id && item.name;
              })
              .map(function (item) {
                var tmm = item.tmm || {};
                return {
                  id:        item.id,
                  name:      item.name,
                  coer:      item.coer      !== undefined ? item.coer      : null,
                  sob:       item.sob       !== undefined ? item.sob       : null,
                  memoryMap: item.memoryMap !== undefined ? item.memoryMap : null,
                  impactMap: item.impactMap !== undefined ? item.impactMap : null,
                  tmm: {
                    category: tmm.category !== undefined ? tmm.category : '',
                    details:  tmm.details  !== undefined ? tmm.details   : '',
                    /* Clamp coordinates to [0.0, 1.0] (FR-US2.04 / data-model).
                       Default to canvas centre (0.5, 0.5) when no tmm section. */
                    x: typeof tmm.x === 'number'
                      ? Math.max(0, Math.min(1, tmm.x))
                      : 0.5,
                    y: typeof tmm.y === 'number'
                      ? Math.max(0, Math.min(1, tmm.y))
                      : 0.5
                  }
                };
              });

            renderCanvas();

          } catch (err) {
            console.error('[TMM] Failed to parse project file:', err);
          }
        };
        reader.readAsText(file);
      }

      /* ════════════════════════════════════════════════════════════════════
         Event listeners
         ════════════════════════════════════════════════════════════════════ */
      document.getElementById('btn-add').addEventListener('click', openModal);
      document.getElementById('btn-save').addEventListener('click', saveToFile);
      document.getElementById('btn-load').addEventListener('click', triggerLoad);

      document.getElementById('file-input').addEventListener('change', function (e) {
        var file = e.target.files && e.target.files[0];
        if (file) {
          loadFromFile(file);
          /* Reset so the same file can be reloaded if needed. */
          e.target.value = '';
        }
      });

      document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
      document.getElementById('btn-modal-submit').addEventListener('click', submitModal);
      document.getElementById('btn-panel-close').addEventListener('click', closeDetailPanel);

      /* Edit mode buttons (T021–T023) */
      document.getElementById('btn-edit').addEventListener('click', openEditMode);
      document.getElementById('btn-edit-confirm').addEventListener('click', confirmEdit);
      document.getElementById('btn-edit-cancel').addEventListener('click', cancelEdit);

      /* Enter in the edit-name field confirms the edit */
      document.getElementById('edit-name').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') confirmEdit();
      });

      /* Backdrop click closes the modal (outside #modal-box). */
      document.getElementById('modal-overlay').addEventListener('click', function (e) {
        if (e.target === document.getElementById('modal-overlay')) closeModal();
      });

      /* Enter in the Name field submits the form. */
      document.getElementById('field-name').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') submitModal();
      });

      /* Escape closes modal, cancels edit, or closes panel. */
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          if (document.getElementById('modal-overlay').classList.contains('visible')) {
            closeModal();
          } else if (document.getElementById('detail-panel').classList.contains('visible')) {
            if (isEditing) {
              cancelEdit();
            } else {
              closeDetailPanel();
            }
          }
        }
      });

      /* Initial render — empty canvas with four quadrant headings visible. */
      renderCanvas();
    </script>
  </body>
</html>
